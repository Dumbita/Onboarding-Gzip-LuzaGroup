<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Menu | Onboarding LuzaGroup</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-wrapper {
      width: 100%;
      max-width: 900px;
      padding: 24px 28px;
      box-sizing: border-box;
    }
    .menu-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .menu-title {
      font-size: 40px;
      font-weight: 600;
    }
    .logout-btn {
      border: 1px solid #3a425a;
      background: transparent;
      color: #c3c8d4;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-gap: 18px;
      justify-items: center;
    }
    .tile {
      width: 120px;
      height: 80px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      text-decoration: none;
      color: #f5f5f5;
      font-size: 16px;
      transition: transform 0.12s ease-out, box-shadow 0.12s ease-out, background 0.12s ease-out;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.6);
    }
    .tile-primary {
      color: #ffd949;
      font-weight: 600;
    }
    .tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.75);
      background: #101727;
    }
    .tile.disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }
    .menu-subtitle {
      margin-top: 18px;
      font-size: 14px;
      color: #c3c8d4;
    }
    @media (max-width: 640px) {
      .menu-title {
        font-size: 30px;
      }
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('luza_logged_in')) {
      window.location.replace('login.html');
    }
  </script>

  <div class="menu-wrapper">
    <div class="menu-header">
      <div class="menu-title">Menu</div>
      <button class="logout-btn" id="logout-button">Sair</button>
    </div>

    <div class="grid">
      <a href="index.html" class="tile tile-primary">Jogo</a>
      <div class="tile disabled"></div>
      <div class="tile disabled"></div>
      <div class="tile disabled"></div>
      <div class="tile disabled"></div>
      <div class="tile disabled"></div>
      <div class="tile disabled"></div>
      <div class="tile disabled"></div>
    </div>

    <div class="menu-subtitle">
      Escolha o jogo para começar. Espaços vazios podem receber novos jogos no futuro.
    </div>
  </div>

  <script>
    document.getElementById('logout-button').addEventListener('click', function () {
      sessionStorage.removeItem('luza_logged_in');
      window.location.replace('login.html');
    });
  </script>
</body>
</html>
